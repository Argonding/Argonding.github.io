<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>2026观鸟记录</title>

    <link rel="icon" href="figures/logo.jpg" sizes="144x144" type="image/jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <style>
        body{
            background: url("figures/qinghai_lake.jpg") no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        .content{
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
        }
        .content {
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .content.loaded {
            opacity: 1;
        }
        .year-title{
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .year-subtitle{
            margin-bottom: 40px;
            opacity: 0.85;
        }

        /* 搜索框样式 */
        .search-box {
            margin-bottom: 30px;
        }
        .search-box input {
            width: 100%;
            max-width: 400px;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 1rem;
            backdrop-filter: blur(5px);
            outline: none;
            transition: 0.3s;
        }
        .search-box input::placeholder {
            color: rgba(255,255,255,0.6);
        }
        .search-box input:focus {
            background: rgba(255,255,255,0.25);
            box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
        }

        .record-card{
            background: rgba(255, 255, 255, 0.65);  /* 白色半透明，若想要纯白可改为 #fff */
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .record-card:hover{
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.95);  /* 悬停时更白一些 */
        }


        .record-card a{
            color: #2c3e50;             /* 深蓝灰，看起来专业且柔和 */
            text-decoration: none;
        }

        .record-date{
            font-size: 0.9rem;
            color: #555
        }

        .record-title{
            font-size: 1.3rem;
            margin-top: 6px;
            color: #1a1a1a;             /* 标题颜色深一点 */
        }

        /* 无结果提示 */
        .no-results {
            text-align: center;
            padding: 40px 20px;
            opacity: 0.7;
            font-size: 1.1rem;
        }
    </style>
</head>

<body onload="setActive()">

<nav class="navbar">
    <div class="navbar-title">Argonding's page</div>

    <ul>
        <li><a id="nav-index" href="index.html">首页</a></li>

        <li><a id="nav-photography" href="photography.html">野外记录</a></li>

<div class="content">

    <h1 class="year-title">2026观鸟记录</h1>

    <p class="year-subtitle">
        记录本年度的观鸟活动与鸟种观察结果。
    </p>

    <!-- 新增搜索框 -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索地点，例如：圆明园" autocomplete="off">
    </div>

    <!-- 给记录列表加一个容器，方便插入无结果提示 -->
    <div id="recordList">
        <div class="record-card">
            <a href="20260526_haidian.html">
                <div class="record-date">2026-05-26</div>
                <div class="record-title">海淀公园</div>
            </a>
        </div>

        <div class="record-card">
            <a href="20260529_campus.html">
                <div class="record-date">2026-05-29</div>
                <div class="record-title">校内鸟调</div>
            </a>
        </div>

        <div class="record-card">
            <a href="20260606_yuanmingyuan.html">
                <div class="record-date">2026-06-06</div>
                <div class="record-title">圆明园</div>
            </a>
        </div>
    </div>

</div>

<script src="script.js"></script>

<script>
    (function() {
        // 创建一个临时的图片对象，加载同一张背景图
        var bgImg = new Image();
        bgImg.src = "figures/qinghai_lake.jpg";  // 和背景图路径保持一致

        bgImg.onload = function() {
            // 图片加载完成，给内容区加上 loaded 类
            var content = document.querySelector('.content');
            if (content) {
                content.classList.add('loaded');
            }
        };

        // 防止图片缓存未触发 onload 的情况（如果已缓存，直接添加）
        if (bgImg.complete) {
            var content = document.querySelector('.content');
            if (content) {
                content.classList.add('loaded');
            }
        }

        // 兜底：2秒后无论如何强制显示
        setTimeout(function() {
            var content = document.querySelector('.content');
            if (content && !content.classList.contains('loaded')) {
                content.classList.add('loaded');
            }
        }, 2000);
    })();
</script>

<!-- 新增搜索逻辑 -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const searchInput = document.getElementById('searchInput');
        const recordList = document.getElementById('recordList');
        const cards = recordList.querySelectorAll('.record-card');

        searchInput.addEventListener('input', function() {
            const keyword = this.value.trim().toLowerCase();
            let hasVisible = false;

            // 先移除可能存在的无结果提示
            const oldMsg = document.getElementById('noResultsMsg');
            if (oldMsg) oldMsg.remove();

            cards.forEach(card => {
                const title = card.querySelector('.record-title').textContent.toLowerCase();
                const date = card.querySelector('.record-date').textContent.toLowerCase();
                if (keyword === '' || title.includes(keyword) || date.includes(keyword)) {
                    card.style.display = '';
                    hasVisible = true;
                } else {
                    card.style.display = 'none';
                }
            });

            // 如果没有匹配项且搜索词不为空，显示提示
            if (!hasVisible && keyword !== '') {
                const msg = document.createElement('div');
                msg.id = 'noResultsMsg';
                msg.className = 'no-results';
                msg.textContent = '没有找到匹配的记录，试试其他关键词。';
                recordList.appendChild(msg);
            }
        });
    });
</script>
